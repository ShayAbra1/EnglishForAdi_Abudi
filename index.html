<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תמלול קולי</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --ink: #eef1f6;
    --muted: #8b93a3;
    --line: #262b35;
    --accent: #ff5a4d;
    --accent-soft: rgba(255, 90, 77, 0.15);
    --ok: #4ad6a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Helvetica Neue", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 560px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    overflow: hidden;
  }
  header {
    padding: 22px 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.2px; }
  .status {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }
  .status.live .dot { background: var(--accent); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #chatBox {
    padding: 24px;
    min-height: 220px;
    max-height: 50vh;
    overflow-y: auto;
    font-size: 17px;
    line-height: 1.7;
  }
  #chatBox .placeholder { color: var(--muted); }
  #chatBox .interim { color: var(--muted); }
  #chatBox .error {
    color: var(--accent);
    background: var(--accent-soft);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 15px;
  }

  footer {
    padding: 20px 24px;
    border-top: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #startBtn {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    color: var(--ink);
    background: #20242d;
    border: 1px solid var(--line);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  #startBtn:hover { background: #262b35; }
  #startBtn.recording {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .hint { font-size: 12px; color: var(--muted); text-align: center; }
  .hint code { background: #20242d; padding: 1px 6px; border-radius: 5px; }
</style>
</head>
<body>
  <main class="app">
    <header>
      <h1>תמלול קולי</h1>
      <div class="status" id="status"><span class="dot"></span><span id="statusText">מוכן</span></div>
    </header>
    <div id="chatBox"><span class="placeholder">לחצו על הכפתור והתחילו לדבר.</span></div>
    <footer>
      <button id="startBtn">🎤 התחל הקלטה</button>
      <p class="hint">דורש <code>Chrome</code> או <code>Edge</code>, והרצה דרך <code>localhost</code> או <code>HTTPS</code> (לא <code>file://</code>).</p>
    </footer>
  </main>

<script>
  const startBtn   = document.getElementById('startBtn');
  const chatBox    = document.getElementById('chatBox');
  const statusEl   = document.getElementById('status');
  const statusText = document.getElementById('statusText');

  let isRecording = false;
  let finalText = '';

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  function setStatus(text, live) {
    statusText.textContent = text;
    statusEl.classList.toggle('live', !!live);
  }

  function showError(msg) {
    const el = document.createElement('div');
    el.className = 'error';
    el.textContent = '⚠️ ' + msg;
    chatBox.appendChild(el);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  if (!SpeechRecognition) {
    chatBox.innerHTML = '';
    showError('הדפדפן אינו תומך בזיהוי דיבור. השתמשו ב-Chrome או Edge.');
    startBtn.disabled = true;
  } else {
    const recognition = new SpeechRecognition();
    recognition.lang = 'he-IL';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = () => {
      isRecording = true;
      startBtn.textContent = '⏹ עצור הקלטה';
      startBtn.classList.add('recording');
      setStatus('מקשיב…', true);
      chatBox.innerHTML = '<span class="placeholder">מקשיב... תתחילו לדבר</span>';
      finalText = '';
    };

    recognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalText += transcript + ' ';
        } else {
          interim += transcript;
        }
      }
      chatBox.innerHTML =
        '<span class="final">' + finalText + '</span>' +
        '<span class="interim">' + interim + '</span>';
      chatBox.scrollTop = chatBox.scrollHeight;
    };

    // טיפול מפורט בשגיאות — מציג את סיבת הכשל
    recognition.onerror = (event) => {
      const reasons = {
        'no-speech':      'לא זוהה דיבור. נסו שוב.',
        'audio-capture':  'לא נמצא מיקרופון זמין.',
        'not-allowed':    'הגישה למיקרופון נדחתה. אשרו את ההרשאה בדפדפן.',
        'service-not-allowed': 'שירות הזיהוי חסום. ודאו הרצה דרך HTTPS או localhost.',
        'network':        'תקלת רשת בזמן הזיהוי.',
        'aborted':        'ההקלטה הופסקה.'
      };
      showError((reasons[event.error] || 'אירעה שגיאה') + ' (' + event.error + ')');
    };

    // תיקון onend לפי ההמלצה — בלי add/remove מיותר של המחלקה recording
    recognition.onend = () => {
      isRecording = false;
      startBtn.textContent = '🎤 התחל הקלטה';
      startBtn.classList.remove('recording');
      setStatus('מוכן', false);

      if (chatBox.innerText.trim() === 'מקשיב... תתחילו לדבר') {
        chatBox.innerHTML = '<span class="placeholder">לא נקלט שמע. נסו שוב.</span>';
      }
    };

    startBtn.addEventListener('click', () => {
      if (isRecording) {
        recognition.stop();
      } else {
        try {
          recognition.start();
        } catch (e) {
          showError('לא ניתן להתחיל הקלטה: ' + e.message);
        }
      }
    });
  }
</script>
</body>
</html>
